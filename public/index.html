<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
</head>
<body>
  <script>
    fetch('/api/me', { credentials: 'include' })
      .then((res) => {
        if (res.ok) {
          window.location.replace('/intranet.html');
        } else {
          window.location.replace('/login.html');
        }
      })
      .catch(() => {
        window.location.replace('/login.html');
      });
  </script>
</body>
</html>
